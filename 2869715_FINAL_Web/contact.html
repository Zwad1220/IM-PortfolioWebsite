<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact | Ziyad Khan</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="js/nav.js" defer></script>
    <script src="js/typing.js" defer></script>
    <script src="js/scroll-reveal.js" defer></script>
    <script src="js/formVal.js" defer></script>

</head>

<body>

    <div id="navbar"></div>

    <main>

        <section class="contact-hero">

            <div class="container">

                <h1 class="typing-heading"
                    data-text="Get In Touch" id="contact-heading">
                </h1>

                <p class="reveal-up">
                    Whether you'd like to discuss a project,
                    graduate opportunity or simply connect,
                    I'd love to hear from you.
                </p>

            </div>

        </section>

        <section class="contact-section reveal-up">

            <div class="container">

                <div>

                    <h2 class="contact-header">Let's Work Together</h2>

                </div>

                <div class="contact-grid">

                    <div class="contact-form-wrapper">

                        <h3>Contact Form</h3>

                        <form id="contact-form">

                            <input
                                type="text"
                                id="name"
                                placeholder="Name">

                            <small id="name-error"
                                   class="error"></small>

                            <input
                                type="email"
                                id="email"
                                placeholder="Email">

                            <small id="email-error"
                                   class="error"></small>

                            <textarea
                                id="message"
                                rows="6"
                                placeholder="Message"></textarea>

                            <small id="message-error"
                                   class="error"></small>

                            <button type="submit"
                                    class="submit-btn">

                                Send Message

                            </button>

                        </form>

                    </div>

                    <div class="contact-details">

                        <h3>Contact Details</h3>

                        <a href="mailto:khanziyad065@gmail.com"
                           class="contact-box reveal-up">

                            Email: khanziyad065@gmail.com

                        </a>

                        <a href="https://www.instagram.com/ziyad_khan_05/"
                           class="contact-box reveal-up">

                            Instagram: ziyad_khan_05

                        </a>

                        <a href="https://github.com/Zwad1220/"
                           class="contact-box reveal-up">

                            GitHub: Zwad1220

                        </a>

                    </div>

                </div>

                <div class="cv-section">

                    <a href="assets/files/SampleCV.pdf"
                       download
                       class="cv-button reveal-up">

                        Download CV

                    </a>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
